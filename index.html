<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大学生制霸</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Campus Conquest</p>
        <h1>大学生制霸</h1>
        <p class="subtitle">看看你的大学生活副本完成度。</p>
      </div>

      <section class="result-card" aria-label="制霸结果卡片">
        <div class="result-main">
          <span class="result-label">当前制霸率</span>
          <strong class="rate-value" id="rateValue">0%</strong>
          <p class="title-line">称号：<span id="titleValue">大学新手村</span></p>
          <p class="result-summary" id="resultSummary">刚进校门，地图还很新。</p>
        </div>

        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <dl class="score-row">
          <div>
            <dt>当前总分</dt>
            <dd id="scoreValue">0</dd>
          </div>
          <div>
            <dt>最大总分</dt>
            <dd id="maxScoreValue">120</dd>
          </div>
          <div>
            <dt>已选项目</dt>
            <dd id="checkedValue">0/30</dd>
          </div>
        </dl>

        <div class="action-row">
          <button class="button button-primary" type="button" id="copyButton">复制文案</button>
          <button class="button button-secondary" type="button" id="downloadButton">保存海报</button>
          <button class="button button-secondary" type="button" id="themeButton">换套皮肤</button>
          <button class="button button-secondary" type="button" id="resetButton">重新生成</button>
        </div>
        <p class="copy-status" id="copyStatus" role="status" aria-live="polite"></p>
      </section>
    </header>

    <section class="map-section" aria-labelledby="mapTitle">
      <div class="section-head section-head--stacked">
        <h2 id="mapTitle">我的大学校园地图</h2>
        <p class="section-subtitle">摊开这张校园分区图，看看哪些区域已经被你点亮。</p>
      </div>
      <div class="campus-map" id="mapAreas"></div>
      <div class="area-details" id="areaDetails" aria-label="区域详情"></div>
    </section>

    <section class="items-section" aria-labelledby="itemsTitle">
      <div class="section-head">
        <div class="section-head__copy">
          <h2 id="itemsTitle">大学生活项目</h2>
          <p class="items-level-legend">等级说明：0 没经历｜1 浅尝一下｜2 正在经历｜3 深度体验｜4 刻进 DNA</p>
        </div>
      </div>
      <div class="items-grid" id="itemsGrid"></div>
    </section>

    <section class="share-section" aria-labelledby="shareTitle">
      <div id="sharePosterContainer"></div>
    </section>

    <footer class="page-footer">
      不是所有人都能绩点制霸，但每个人都可以期末周幸存。
    </footer>
  </main>

  <script src="vendor/html2canvas.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
